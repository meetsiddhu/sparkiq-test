/* ============================================================
   SESSION — chat state machine
   ============================================================ */
let SES = null;

function startSession(childId, subject, forceMode) {
  const c = S.children.find(x => x.id === childId);
  const isExplore = subject === "explore";
  if (!isExplore && !subjectAllowed(childId, subject)) return lockedMsg();
  const lv = isExplore ? null : levelsFor(childId, subject);
  const band = bandOf(c.year);
  if (!isExplore) { c.lastSubject = subject; save(); }

  /* North Star: second session within 7 days of a just-right diagnostic */
  if (lv && lv.diag === "done" && !lv.secondCounted) {
    const prior = S.sessions.some(s => s.childId === childId && s.subject === subject && s.start > lv.diagAt);
    if (prior && Date.now() - lv.diagAt <= 7 * 864e5) {
      lv.secondCounted = true; S.northStar.second++; save();
    }
  }

  SES = {
    childId, subject, child: c, band,
    mode: forceMode || (isExplore ? "explore" : (lv.diag === "pending" ? "diagnostic" : "learn")),
    item: null, hintIdx: 0, attempts: 0,
    diagCount: 0, diagCorrect: 0,
    quizCount: 0, quizCorrect: 0, quizTotal: 6,
    examCount: 0, examCorrect: 0, examTimes: [], examTimer: null, examStart: 0, examKind: null,
    xp: 0, turns: 0, start: Date.now(), recentQs: [], lastMsgAt: 0,
    sessionRow: { id: uuid(), childId, subject, start: Date.now(), end: 0, turns: 0, xp: 0 },
    skillsSeen: new Set(), correctStreak: 0, nudged: false,
  };
  S.sessions.unshift(SES.sessionRow); save();

  const subj = SUBJECTS.find(s => s.id === subject);
  render(`
    <div class="topbar">
      <button class="ghost small" onclick="endSession()">← Done</button>
      ${avatarHeader(c)}
      <span class="chip">${isExplore ? "🔭 Explore" : subj.glyph + " " + subj.name}</span>
      <span class="row"><span class="chip timerchip" id="examclock" style="display:none"></span>
      <span class="chip xp" id="sesxp">⭐ 0 XP</span></span>
    </div>
    ${classBarHtml()}
    <div class="chat-wrap">
      <div class="msgs" id="msgs"></div>
      <div class="opts" id="opts"></div>
      <div class="actions" id="acts"></div>
      <div class="inputbar" id="ibar">
        <input id="kidin" maxlength="${CONFIG.maxMsgLen}" placeholder="Type here…" autocomplete="off"
          onkeydown="if(event.key==='Enter')submitKid()">
        ${micButtonHtml(c)}
        <button class="primary" onclick="submitKid()">Send</button>
      </div>
    </div>`);

  clearInterval(window._nudge);
  window._nudge = setInterval(checkBreakNudge, 30000);

  if (SES.mode === "diagnostic") beginDiagnostic();
  else if (SES.mode === "review") beginReview();
  else if (SES.mode === "explore") beginExplore();
  else beginLearn();
}

function say(text, mini) {
  const m = document.getElementById("msgs"); if (!m) return;
  const d = document.createElement("div");
  d.className = "msg spark-msg";
  d.textContent = text;
  if (mini) { const s = document.createElement("small"); s.className = "mini"; s.textContent = mini; d.appendChild(s); }
  m.appendChild(d); d.scrollIntoView({ behavior: "smooth", block: "end" });
  if (SES && SES.child && SES.child.readAloud) TTS.speak(text, personaFor(SES.child));
}
function personaFor(child) { return personaById(child && child.persona); }
/* Talking avatar + read-aloud toggle for a session header. */
function avatarHeader(child) {
  const p = personaFor(child);
  const ra = child.readAloud ? "on" : "";
  const spk = TTS.supported ? `<button class="audio-btn ${ra}" id="spk-btn" title="Read aloud" onclick="toggleReadAloud('${child.id}')">${child.readAloud ? "🔊" : "🔈"}</button>` : "";
  return `<span class="avatar-row"><span class="avatar" style="--pcol:${p.color}">${p.emoji}</span>${spk}</span>`;
}
function toggleReadAloud(childId) {
  const c = S.children.find(x => x.id === childId); if (!c) return;
  c.readAloud = !c.readAloud; save();
  const b = document.getElementById("spk-btn");
  if (b) { b.classList.toggle("on", c.readAloud); b.textContent = c.readAloud ? "🔊" : "🔈"; }
  if (!c.readAloud) TTS.stop();
  else if (SES && SES.item) TTS.speak(SES.item.q, personaFor(c));
}
/* Mic button (voice answers) — only when the parent has enabled voice input. */
function micButtonHtml(child) {
  if (!child.voiceInput || !STT.supported) return "";
  return `<button class="mic-btn" id="mic-btn" title="Speak your answer" onclick="toggleMic()">🎙️</button>`;
}
function toggleMic() {
  const btn = document.getElementById("mic-btn"); const inp = document.getElementById("kidin");
  if (STT.listening) { STT.stop(); btn && btn.classList.remove("listening"); return; }
  TTS.stop();
  const ok = STT.start(
    text => { if (inp) { inp.value = text; } },
    () => { btn && btn.classList.remove("listening"); if (inp && inp.value.trim()) submitKid(); }
  );
  if (ok) btn && btn.classList.add("listening");
  else sys("Voice answers aren't available on this device — you can still type. 🙂");
}
function kidSay(text) {
  const m = document.getElementById("msgs"); if (!m) return;
  const d = document.createElement("div"); d.className = "msg kid"; d.textContent = text;
  m.appendChild(d); d.scrollIntoView({ behavior: "smooth", block: "end" });
}
function sys(text) {
  const m = document.getElementById("msgs"); if (!m) return;
  const d = document.createElement("div"); d.className = "msg sys"; d.textContent = text;
  m.appendChild(d); d.scrollIntoView({ behavior: "smooth", block: "end" });
}
function setOpts(list) { /* multiple-choice buttons */
  const o = document.getElementById("opts"); if (!o) return;
  o.innerHTML = "";
  (list || []).forEach((t, i) => {
    const b = document.createElement("button");
    b.textContent = String.fromCharCode(65 + i) + ".  " + t;
    b.onclick = () => { kidSay(t); handleAnswer(String(i)); };
    o.appendChild(b);
  });
}
function setActions(list) { /* ≤2 actions, always */
  const a = document.getElementById("acts"); if (!a) return;
  a.innerHTML = "";
  (list || []).slice(0, 2).forEach(([label, fn]) => {
    const b = document.createElement("button");
    b.textContent = label; b.onclick = fn; a.appendChild(b);
  });
}
function showInput(show) { const b = document.getElementById("ibar"); if (b) b.style.display = show ? "flex" : "none"; }
function classBarHtml() {
  return `<div class="classbar"><div class="classbar-lbl"><span id="classlbl">Today's class</span><span id="classpct">🎯</span></div>
    <div class="progressbar"><div id="classfill" style="width:0%"></div></div></div>`;
}
function addXp(n) {
  if (!SES) return;
  SES.xp = Math.min(CONFIG.sessionXpCap, SES.xp + n);
  SES.sessionRow.xp = SES.xp;
  const lv = SES.subject !== "explore" && SES.subject !== "exam" ? levelsFor(SES.childId, SES.subject) : null;
  if (lv) { lv.xp += n; }
  save();
  const chip = document.getElementById("sesxp");
  if (chip) { chip.textContent = `⭐ ${SES.xp} XP`; chip.classList.remove("pop"); void chip.offsetWidth; chip.classList.add("pop"); }
  updateClassBar();
}
/* Class progress: the session is a "class" filling toward classGoalXp, then it loops into a
   fresh "bonus round" so a keen kid keeps going without ever being stopped. */
function updateClassBar() {
  const bar = document.getElementById("classfill"); if (!bar) return;
  const round = Math.floor(SES.xp / CONFIG.classGoalXp);
  const within = SES.xp - round * CONFIG.classGoalXp;
  bar.style.width = Math.min(100, within / CONFIG.classGoalXp * 100) + "%";
  const lbl = document.getElementById("classlbl");
  if (lbl) lbl.textContent = round === 0 ? "Today's class" : `Bonus round ${round} 🔥`;
}
/* Celebrate every Nth correct answer within a class — momentum without a dark pattern.
   Kids who told us it was "boring" get celebrations more often (wantsMoreFun signal). */
function classMilestone() {
  SES.correctCount = (SES.correctCount || 0) + 1;
  const every = SES.child.wantsMoreFun ? Math.max(3, CONFIG.milestoneEvery - 2) : CONFIG.milestoneEvery;
  if (SES.correctCount % every === 0) {
    confetti();
    sys(`🎉 ${SES.correctCount} correct this class — you're on fire, ${SES.child.nickname}!`);
    return true;
  }
  return false;
}

/* ---------- Turn gate: rate limit, length, moderation, daily cap ---------- */
function gateTurn(text) {
  const now = Date.now();
  if (now - SES.lastMsgAt < CONFIG.minMsgIntervalMs) {
    sys("Whoa, speedy! Give me a second to think. 🐢"); return false;
  }
  SES.lastMsgAt = now;
  if (text.length > CONFIG.maxMsgLen) {
    sys(`That's a long one! Can you say it in fewer words? (max ${CONFIG.maxMsgLen} letters)`); return false;
  }
  const flag = SAFETY.check(text);
  if (flag) {
    logSafety(SES.childId, flag.kind, flag.kind === "distress" ? "Distress language detected; support message + Kids Helpline shown." : "Message redirected (" + flag.kind + ").");
    say(flag.reply);
    if (flag.kind === "distress") setActions([["Back to learning", () => resumeAfterSafety()]]);
    return false;
  }
  SES.sessionRow.turns = ++SES.turns; save();
  /* Only the REMOTE LLM costs money, so only remote calls are metered against the daily cap.
     The built-in offline engine is free and unlimited — a kid mid-class must never be cut off.
     (Aishu pilot: the old cap throttled free offline learning after ~10 questions.) */
  if (S.settings.engine === "remote") {
    const used = useTurn(SES.childId);
    if (used > tier().aiTurnsPerDay) {
      say(`We've used today's AI-chat helper, ${SES.child.nickname} — but there's still LOADS to practise! I'll switch to my built-in questions so we can keep going. 🚀`);
      logSafety(SES.childId, "rate_limit", "Daily remote-LLM turn limit reached — fell back to free offline engine, learning continues.");
      S.settings.engine = "local"; save();
    }
  }
  return true;
}
function resumeAfterSafety() {
  if (SES.item) presentItem(SES.item, true); else routeMode();
}
function routeMode() {
  if (SES.mode === "diagnostic") nextDiagnostic();
  else if (SES.mode === "quiz") nextQuiz();
  else if (SES.mode === "review") nextReview();
  else if (SES.mode === "exam") nextExam();
  else if (SES.mode === "explore") { showInput(true); }
  else nextLearn();
}

/* ---------- Break check-in (gentle; keeps 'keep going' frictionless) ----------
   Aishu pilot: it stopped too early. A session is now a ~1hr class the kid drives.
   We still offer a stretch every ~25 min (healthy, and validates stopping IS okay),
   but "keep going" is the default and the class continues. This is NOT an infinite
   feed — the class has a visible goal arc (see class progress bar). */
function checkBreakNudge() {
  if (!SES || SES.nudged) return;
  const mins = (Date.now() - SES.start) / 60000;
  const cap = SES.child.young ? CONFIG.breakNudgeMinutesYoung : CONFIG.breakNudgeMinutes;
  if (mins >= cap) {
    SES.nudged = true;
    TTS.stop();
    const v = modal(`<div class="celebrate-big"><div class="big">🌈</div>
      <h2>${Math.round(mins)} minutes of awesome focus, ${esc(SES.child.nickname)}!</h2>
      <p class="dim">Want a quick 20-second wiggle-and-stretch, then keep going? Or wrap up for now — both are great choices.</p>
      <div class="actions" style="margin-top:16px">
        <button class="spark" id="bn-more">Keep going! 🚀</button>
        <button class="ghost" id="bn-stop">Finish for now ⭐</button>
      </div></div>`);
    v.dataset.lock = "1";
    v.querySelector("#bn-stop").onclick = () => { v.remove(); endSession(true); };
    v.querySelector("#bn-more").onclick = () => { v.remove(); confetti(); setTimeout(() => { SES && (SES.nudged = false); }, 25 * 60000); };
  }
}

/* ---------- Item presentation & answering ---------- */
function presentItem(item, isRepeat) {
  SES.item = item; SES.hintIdx = 0; SES.attempts = 0; SES.answered = false;
  SES.recentQs.push(item.q); SES.recentQs = SES.recentQs.slice(-60); // Aishu: avoid repeats far longer
  /* Intuition-first teach card: the first time a child meets a skill (or after they told us
     it was confusing), teach the CONCEPT before asking — hook → analogy → model. */
  if (!isRepeat && SES.mode === "learn") {
    const key = TEACH[item.skillId] ? item.skillId : null;
    if (key) {
      S.taught = S.taught || {};
      const t = S.taught[SES.childId] = S.taught[SES.childId] || {};
      const wantsReteach = SES.child.wantsSlower && !SES._reTaught;
      if (!t[key] || wantsReteach) {
        t[key] = Date.now(); if (wantsReteach) SES._reTaught = true;
        save();
        say(TEACH[key], "New idea — here's the intuition first");
      }
    }
  }
  SES.skillsSeen.add(item.skillName);
  if (!isRepeat) say(item.q, SES.mode === "exam" ? null : item.skillName);
  else say("Here it is again: " + item.q);
  if (item.opts) { setOpts(item.opts); showInput(false); }
  else { setOpts([]); showInput(true); document.getElementById("kidin").focus(); }
  if (SES.mode === "exam") { setActions([["Skip →", () => recordExam(false, true)]]); startExamClock(); }
  else if (SES.mode === "selmock") { setActions([["Skip →", () => recordMock(false)], ["💡 Hint", () => giveHint()]]); startExamClock(); }
  else setActions([["💡 Hint", () => giveHint()], ["🧰 Tools", () => openTools()]]);
}
function giveHint() {
  const it = SES.item; if (!it) return;
  if (SES.hintIdx < it.hints.length) { say("Hint: " + it.hints[SES.hintIdx++]); }
  else { say("Let me show you how it works:\n\n" + it.worked); afterWorked(); }
}
function submitKid() {
  const inp = document.getElementById("kidin");
  const text = inp.value.trim(); if (!text) return;
  inp.value = "";
  kidSay(text);
  handleAnswer(text, true);
}
function handleAnswer(value, isTyped) {
  if (!gateTurn(isTyped ? value : "option")) return;
  if (SES.mode === "explore") return exploreReply(value);
  if (SES.mode === "feynman") return feynmanReply(value);
  if (SES.mode === "writing") return writingReply(value);
  if (SES.mode === "speak") return speakReply(value);
  const it = SES.item; if (!it) return;
  /* Guard: once an answer is accepted, ignore repeats until the next
     question renders — double-taps must never double-count. */
  if (SES.answered) return;
  const correct = it.check(value);
  if (SES.mode === "diagnostic") { SES.answered = true; return recordDiagnostic(correct); }
  if (SES.mode === "quiz") { SES.answered = true; return recordQuiz(correct); }
  if (SES.mode === "review") { SES.answered = true; return recordReview(correct); }
  if (SES.mode === "exam") return recordExam(correct, false);
  if (SES.mode === "selmock") return recordMock(correct);
  if (SES.mode === "selective") return recordSelective(correct);
  /* learn / challenge */
  bumpStat(it.skillId, correct);
  if (correct) {
    SES.answered = true;
    SES.correctStreak++;
    say(GREETINGS.celebrate());
    addXp(CONFIG.xpCorrect);
    const milestone = classMilestone();
    if (SES.correctStreak === 3) { starEarned(); }
    setTimeout(nextLearn, milestone ? 1300 : 800);
  } else {
    SES.attempts++; SES.correctStreak = 0;
    addXp(CONFIG.xpAttempt);
    if (SES.attempts >= 2) {
      SES.answered = true;
      queueReview(it);
      offerRevision(it, () => nextLearn(it.skillId));
    } else {
      say(GREETINGS.encourage() + " " + it.hints[Math.min(SES.hintIdx, it.hints.length - 1)]);
      SES.hintIdx = Math.min(SES.hintIdx + 1, it.hints.length);
      if (it.opts) setOpts(it.opts);
    }
  }
}
/* Mistake recovery: walk through a WAY of solving it, then offer to revise the concept —
   directly serving "when a kid makes a mistake, help them solve it and revise the idea". */
function offerRevision(it, onNext) {
  setOpts([]); showInput(false);
  say(`No worries — the answer is ${it.answer}. Here's a way to get there:\n\n${it.worked}`);
  SES.missStreak = (SES.missStreak || 0) + 1;
  const trickLine = it.trick ? `\n\n🧠 Handy way to remember: ${it.trick}` : "";
  const acts = [["Try a similar one 💪", () => { SES.missStreak = 0; onNext(); }]];
  /* If they've missed a couple in a row, proactively offer a concept refresh. */
  if (SES.missStreak >= 2 && it.real) {
    say(`Let's lock this in.${trickLine}\n\n🌏 Where it shows up: ${it.real}`);
    acts.push(["Got it, keep going →", () => { SES.missStreak = 0; onNext(); }]);
  } else {
    if (it.trick) say(`🧠 A way to remember it: ${it.trick}`);
    acts.push(["Something new →", () => { SES.missStreak = 0; nextLearn(); }]);
  }
  setActions(acts);
}
function afterWorked() {
  setOpts([]); showInput(false);
  setActions([["Try a similar one 💪", () => nextLearn(SES.item.skillId)], ["Something new →", () => nextLearn()]]);
}
function bumpStat(skillId, correct) {
  S.quizStats[SES.childId] = S.quizStats[SES.childId] || {};
  const st = S.quizStats[SES.childId][skillId] = S.quizStats[SES.childId][skillId] || { a: 0, c: 0 };
  st.a++; if (correct) st.c++;
  save();
}
function queueReview(it) {
  /* Derive the true subject from the skill id so exam-mode misses file under
     the subject they belong to (maths skill ids have no ':' prefix). */
  const subj = it.skillId.includes(":") ? it.skillId.split(":")[0] : "maths";
  const existing = S.review.find(r => r.childId === SES.childId && r.skillId === it.skillId);
  if (existing) { existing.idx = 0; existing.due = Date.now() + 864e5; existing.lapses++; }
  else S.review.push({ id: uuid(), childId: SES.childId, subject: subj,
    skillId: it.skillId, skillName: it.skillName, due: Date.now() + 864e5 * CONFIG.reviewIntervalsDays[0], idx: 0, lapses: 0 });
  save();
  sys(`🔁 "${it.skillName}" added to your review queue — I'll bring it back tomorrow so it sticks.`);
}
function starEarned() {
  const lv = levelsFor(SES.childId, SES.subject);
  lv.stars++; save();

}

/* ---------- Diagnostic ---------- */
function beginDiagnostic() {
  say(`Let's find your perfect starting level in ${SUBJECTS.find(s=>s.id===SES.subject).name} — not too easy, not too hard, just right. ${CONFIG.diagnosticQuestions} quick questions, and guessing is totally fine!`);
  setTimeout(nextDiagnostic, 900);
}
function nextDiagnostic() {
  if (SES.diagCount >= CONFIG.diagnosticQuestions) return finishDiagnostic();
  SES.diagCount++;
  /* Adaptive & kind: drift the band with running performance, and after a miss soften to
     the easier skills in the band. A struggling child shouldn't be handed the hardest topic. */
  let effBand = SES.band;
  if (SES.diagCount > 1) {
    const ratio = SES.diagCorrect / (SES.diagCount - 1);
    if (ratio < 0.4) effBand = Math.max(0, SES.band - 1);
    else if (ratio > 0.75) effBand = Math.min(4, SES.band + 1);
  }
  presentItem(Engine.question(SES.subject, effBand, { avoid: SES.recentQs, prefEasy: SES.diagStruggling }));
}
function recordDiagnostic(correct) {
  bumpStat(SES.item.skillId, correct);
  if (correct) { SES.diagCorrect++; SES.diagStruggling = false; say(pick(["Nice one!", "Got it! ✔", "Yes!"])); }
  else { SES.diagStruggling = true; say(pick(["No stress — that one helps me tune your level.", "All good, that tells me heaps!", "That's okay — I'll find your just-right spot."])); }
  addXp(CONFIG.xpAttempt);
  setTimeout(nextDiagnostic, 700);
}
function finishDiagnostic() {
  if (SES.diagFinished) return;
  SES.diagFinished = true;
  const lv = levelsFor(SES.childId, SES.subject);
  const ratio = SES.diagCorrect / CONFIG.diagnosticQuestions;
  lv.level = ratio >= 0.8 ? 3 : ratio >= 0.4 ? 2 : 1;
  lv.diag = "done"; lv.diagAt = Date.now();
  if (!S.freeSubject[SES.childId] && tier().subjects !== "all") S.freeSubject[SES.childId] = SES.subject;
  S.northStar.diag++; save();
  confetti();
  awardBadge(SES.childId, SUBJECTS.find(s => s.id === SES.subject).name + " Explorer");
  say(`🎯 Nice work! From those questions, Level ${lv.level} looks about right. One more thing — how did they feel to you?`);
  /* Self-report calibration: the measured placement is the base, the child's own read
     nudges it ±1. Measured + self-report beats either alone. */
  showInput(false);
  const o = document.getElementById("opts"); o.innerHTML = "";
  [["😅 A bit too hard", -1], ["🙂 Just right", 0], ["😎 Too easy", 1]].forEach(([label, adj]) => {
    const b = document.createElement("button");
    b.textContent = label;
    b.onclick = () => { kidSay(label); applySelfReport(adj); };
    o.appendChild(b);
  });
  setActions([["🧰 Tools", () => openTools()]]);
}
function applySelfReport(adj) {
  const lv = levelsFor(SES.childId, SES.subject);
  lv.level = Math.max(1, Math.min(3, lv.level + adj));
  lv.selfReport = adj < 0 ? "too_hard" : adj > 0 ? "too_easy" : "just_right";
  save();
  setOpts([]);
  say(adj < 0 ? `Thanks for telling me — we'll take it step by step and build your confidence. 💪`
    : adj > 0 ? `Love it — you're ready for a bit more. I'll keep it spicy! 🚀`
    : `Perfect — I'll keep it at that just-right pace. 🌟`);
  setActions([["Let's learn! 🚀", () => { SES.mode = "learn"; beginLearn(); }], ["🧰 Tools", () => openTools()]]);
}

/* ---------- Learn ---------- */
function beginLearn() {
  const lv = levelsFor(SES.childId, SES.subject);
  const sums = (S.summaries[SES.childId] || []).filter(s => s.subject === SES.subject);
  /* Rosenshine principle #1 — begin with a short review of previous learning. One quick
     warm-up question from a skill this child has practised before makes it stick. */
  const past = Object.keys((S.quizStats || {})[SES.childId] || {}).filter(k =>
    k.startsWith(SES.subject + ":") || (SES.subject === "maths" && !k.includes(":")));
  if (past.length && !SES.warmedUp) {
    SES.warmedUp = true;
    say(`⚡ Quick warm-up first, ${SES.child.nickname} — yesterday's brain-food makes today stick!`);
    setTimeout(() => { SES.mode = "learn"; presentItem(Engine.question(SES.subject, learnBand(), { skillId: pick(past), avoid: SES.recentQs })); }, 800);
    return;
  }
  say(sums.length ? GREETINGS.returning(SES.child.nickname, sums[0].text) : `Level ${lv.level}${lv.challenge ? " · 🚀 working ahead" : ""}, here we come! Pick a topic below, or I'll surprise you.`);
  /* Topic chips from real skills (Hick's law: choices only while fresh). Each maps to a
     genuine skill id so a tap on "Percentages" gives a percentages question. */
  const skills = Engine.skillsFor(SES.subject, learnBand());
  if (skills.length > 1) {
    const o = document.getElementById("opts"); o.innerHTML = "";
    skills.slice(0, 5).forEach(sk => {
      const b = document.createElement("button");
      b.textContent = sk.name;
      b.onclick = () => { setOpts([]); nextLearn(sk.id); };
      o.appendChild(b);
    });
    setActions([["🎲 Surprise me", () => { setOpts([]); nextLearn(); }], ["🧰 Tools", () => openTools()]]);
    showInput(false);
  } else {
    setTimeout(() => nextLearn(), 800);
  }
}
function learnBand() {
  const lv = levelsFor(SES.childId, SES.subject);
  let b = SES.band;
  if (lv.challenge) b = Math.min(4, b + 1);
  else if (lv.level === 1 && Math.random() < 0.35) b = Math.max(0, b - 1);
  else if (lv.level === 3 && Math.random() < 0.3) b = Math.min(4, b + 1);
  return b;
}
function nextLearn(skillId) {
  SES.mode = "learn";
  /* If the kid told us it was too hard/confusing last time, start gentler this session. */
  const prefEasy = SES.child.easeUp || SES.child.wantsSlower ? SES.correctCount < 3 : false;
  presentItem(Engine.question(SES.subject, learnBand(), { skillId, avoid: SES.recentQs, prefEasy }));
}

/* ---------- Quiz (interleaved retrieval practice) ---------- */
function startQuiz() {
  SES.mode = "quiz"; SES.quizCount = 0; SES.quizCorrect = 0;

  const seen = Object.keys(S.quizStats[SES.childId] || {}).filter(k => k.startsWith(SES.subject) || (SES.subject === "maths" && !k.includes(":")));
  const useOld = seen.length > 1 && Math.random() < 0.5;
  const opts = useOld ? { skillId: pick(seen), avoid: SES.recentQs } : { avoid: SES.recentQs };

}
function recordQuiz(correct) {
  bumpStat(SES.item.skillId, correct);
  if (correct) { SES.quizCorrect++; say(pick(["✔ Correct!", "Yes! ✔", "Bang on! ✔"])); addXp(CONFIG.xpCorrect); }
  else { say(`Not this time — answer: ${SES.item.answer}. ${SES.item.trick}`); queueReview(SES.item); addXp(CONFIG.xpAttempt); }

}

  setOpts([]); showInput(false);
  setActions([["Keep learning 📚", () => { SES.mode = "learn"; nextLearn(); }], ["Finish ⭐", () => endSession()]]);

/* ---------- Review (spaced repetition) ---------- */
function beginReview() {
  SES.reviewItems = dueReviews(SES.childId);
  if (!SES.reviewItems.length) { say("Nothing due for review right now — your memory garden is watered! 🌱");
    setActions([["Learn something 📚", () => { SES.mode = "learn"; nextLearn(); }], ["Home ⭐", () => endSession()]]); return; }
  say(`🔁 Review time! ${SES.reviewItems.length} thing${SES.reviewItems.length > 1 ? "s" : ""} to make permanent. Spaced review is the closest thing learning has to a cheat code.`);
  setTimeout(nextReview, 900);
}
function nextReview() {
  SES.reviewItems = SES.reviewItems || [];
  const r = SES.reviewItems.shift();
  if (!r) {
    say("Review complete — those memories just got a whole lot stronger! 💪"); confetti();
    setOpts([]); showInput(false);
    setActions([["Keep learning 📚", () => { SES.mode = "learn"; SES.subject = SES.subject === "review" ? "maths" : SES.subject; nextLearn(); }], ["Finish ⭐", () => endSession()]]);
    return;
  }
  SES.currentReview = r;
  SES.subject = r.subject;
  presentItem(Engine.question(r.subject, SES.band, { skillId: r.skillId }));
}
function recordReview(correct) {
  const r = SES.currentReview;
  bumpStat(SES.item.skillId, correct);
  if (correct) {
    r.idx++;
    if (r.idx >= CONFIG.reviewIntervalsDays.length) {
      S.review = S.review.filter(x => x.id !== r.id);
      say(`✔ Mastered! "${r.skillName}" has graduated from review — it's yours forever now. 🎓`);
      confetti();
    } else {
      r.due = Date.now() + 864e5 * Engine.nextReviewInterval(r.idx);
      say(`✔ Got it! I'll check "${r.skillName}" again in ${Engine.nextReviewInterval(r.idx)} days — each gap makes it stronger.`);
    }
    addXp(CONFIG.xpCorrect);
  } else {
    r.idx = 0; r.lapses++; r.due = Date.now() + 864e5;
    say(`Not yet — here's the key idea again:\n\n${SES.item.worked}\n\nI'll bring it back tomorrow. Forgetting then re-finding is literally how memory works.`);
    addXp(CONFIG.xpAttempt);
  }
  save();
  setTimeout(nextReview, 1400);
}

      S.summaries[SES.childId].unshift({
        at: Date.now(), subject: SES.subject,
        text: `Last time you worked on ${skills.join(" & ")} — want to build on that?`,
      });
      S.summaries[SES.childId] = S.summaries[SES.childId].slice(0, 10);
    }
    save();
    const mins = Math.max(1, Math.round((Date.now() - SES.start) / 60000));
    if (SES.xp > 0 || afterNudge) {
      confetti();
      const cid = SES.childId;
      const nick = SES.child.nickname;
      const lastSubj = SES.subject || "";
      render(`<div class="celebrate-big"><div class="big">🌟</div>
        <h2>Great session, ${esc(nick)}!</h2>
        <p class="dim">${mins} min · +${SES.xp} XP · ${SES.skillsSeen.size ? [...SES.skillsSeen].length + " skills touched" : "curiosity fed"}</p>
        <p style="margin-top:14px">How was that today, ${esc(nick)}? <small class="dim">(totally optional)</small></p>
        <div class="row" id="fb-mood" style="justify-content:center;gap:10px;margin:12px 0 4px">
          <button class="ghost" style="font-size:1.5em" title="Loved it" onclick="kidRate('${cid}','${lastSubj}','loved')">😄</button>
          <button class="ghost" style="font-size:1.5em" title="It was okay" onclick="kidRate('${cid}','${lastSubj}','ok')">🙂</button>
          <button class="ghost" style="font-size:1.5em" title="Not my favourite" onclick="kidRate('${cid}','${lastSubj}','meh')">😕</button>
        </div>
        <div id="fb-reason"></div>
        <p style="margin-top:10px" class="dim">Everything is saved. Rest helps it stick! 🌙</p>
        <div class="actions" style="max-width:300px;margin:14px auto">
          <button class="primary" onclick="screenHome('${cid}')">Home ⭐</button></div></div>`);
      SES = null; return;
    }
    const cid = SES.childId; SES = null; screenHome(cid); return;
  }
  screenProfiles();
}
/* ---------- Kid feedback loop — a real "do they love it" signal that ALSO tunes the app.
   Aggregate counts + reason tags only (privacy-respecting), no pressure, celebrates any choice. */
function kidRate(childId, subject, mood) {
  S.fun = S.fun || {};
  const f = S.fun[childId] = S.fun[childId] || { loved: 0, ok: 0, meh: 0 };
  if (f[mood] !== undefined) f[mood]++;
  save();
  const moodEl = document.getElementById("fb-mood");
  if (moodEl) moodEl.innerHTML = `<p class="tag" style="font-size:1em">Thanks! 🌟</p>`;
  const reasonEl = document.getElementById("fb-reason");
  if (!reasonEl) return;
  if (mood === "loved") {
    reasonEl.innerHTML = `<p class="dim" style="margin-top:8px">Yay! What did you like most?</p>
      <div class="row" style="justify-content:center;gap:8px;flex-wrap:wrap;margin-top:6px">
        ${["It was fun", "Just right", "My buddy 🚀", "Felt smart"].map(r => `<button class="chip" onclick="kidReason('${childId}','${subject}','loved:${r.replace(/[^a-z ]/gi,"")}')">${r}</button>`).join("")}</div>`;
  } else {
    reasonEl.innerHTML = `<p class="dim" style="margin-top:8px">No worries — what would make it better?</p>
      <div class="row" style="justify-content:center;gap:8px;flex-wrap:wrap;margin-top:6px">
        ${["Too hard", "Too easy", "A bit boring", "Confusing", "Too long"].map(r => `<button class="chip" onclick="kidReason('${childId}','${subject}','${r.replace(/[^a-z ]/gi,"")}')">${r}</button>`).join("")}</div>`;
  }
}
/* Store the reason AND close the loop: adjust the child's next experience accordingly.
   Then ask the third question — "I wish I had…" — so we capture ideas, not just problems. */
function kidReason(childId, subject, reason) {
  S.funReasons = S.funReasons || {};
  (S.funReasons[childId] = S.funReasons[childId] || {});
  S.funReasons[childId][reason] = (S.funReasons[childId][reason] || 0) + 1;
  applyKidSignal(childId, subject, reason);
  save();
  const reasonEl = document.getElementById("fb-reason");
  if (reasonEl) {
    reasonEl.innerHTML = `<p class="tag good" style="font-size:1em;display:inline-block">Got it — I'll use that next time. 💛</p><div id="fb-wish"></div>`;
    const wishEl = document.getElementById("fb-wish");
    if (wishEl) renderWishStep(wishEl, childId, subject, () => { wishEl.innerHTML = `<p class="dim" style="margin-top:8px">Ooh, great idea — I'll tell my team! ✨</p>`; });
  }
}
/* The "use the feedback to improve" step, in-product: kid signals steer difficulty + delight. */
function applyKidSignal(childId, subject, reason) {
  const c = S.children.find(x => x.id === childId); if (!c) return;
  const lv = subject && subject !== "explore" && subject !== "exam" && S.levels[childId] ? S.levels[childId][subject] : null;
  if (/Too hard/i.test(reason)) { if (lv) { lv.level = Math.max(1, lv.level - 1); lv.challenge = false; } c.easeUp = true; }
  else if (/Too easy/i.test(reason)) { if (lv) lv.level = Math.min(3, lv.level + 1); c.suggestChallenge = true; }
  else if (/boring/i.test(reason)) { c.wantsMoreFun = true; }   // more celebration + variety hints
  else if (/Confusing/i.test(reason)) { if (lv) lv.level = Math.max(1, lv.level - 1); c.wantsSlower = true; }
  else if (/Too long/i.test(reason)) { c.prefersShorter = true; }
}
function funScore(childId) {
  const f = (S.fun || {})[childId]; if (!f) return null;
  const total = f.loved + f.ok + f.meh; if (!total) return null;
  return { total, loved: f.loved, ok: f.ok, meh: f.meh, pctLoved: Math.round(f.loved / total * 100) };
}

/* ---------- Expert Council: rationalise ALL kid + parent feedback into a
   prioritised, verdict-tagged board of what to incorporate. On-device, aggregate. */
function gatherFeedbackText() {
  const items = [];
  Object.entries(S.funReasons || {}).forEach(([cid, rs]) => Object.entries(rs).forEach(([r, n]) => {
    if (r.startsWith("loved:")) return;
    for (let i = 0; i < n; i++) items.push({ text: r, from: "kid" });
  }));
  Object.values(S.wishes || {}).forEach(list => list.forEach(w => items.push({ text: w.wish, from: "kid" })));
  (S.parentFeedback || []).forEach(p => {
    if (p.improve) items.push({ text: p.improve, from: "parent" });
    if (p.wish) items.push({ text: p.wish, from: "parent" });
    if (p.liked) items.push({ text: p.liked, from: "parent", positive: true });
    if (p.comments) items.push({ text: p.comments, from: "parent" });
  });
  return items;
}
function runCouncil() {
  const items = gatherFeedbackText();
  const byTheme = {};
  items.forEach(it => classifyFeedback(it.text).forEach(th => {
    const e = byTheme[th.id] = byTheme[th.id] || { theme: th, count: 0, kid: 0, parent: 0 };
    e.count++; if (it.from === "kid") e.kid++; else e.parent++;
  }));
  const rows = Object.values(byTheme).sort((a, b) =>
    (VERDICT_RANK[a.theme.verdict] - VERDICT_RANK[b.theme.verdict]) || (b.count - a.count));
  return { rows, total: items.length };
}
const VERDICT_META = {
  incorporate: { label: "Incorporate now", cls: "good", glyph: "✅" },
  consider: { label: "Consider", cls: "", glyph: "🤔" },
  defer: { label: "Defer", cls: "", glyph: "🕒" },
  reject: { label: "Not building", cls: "", glyph: "🚫" },
};
function councilBoard() {
  const { rows, total } = runCouncil();
  const lensLegend = COUNCIL_LENSES.map(l => `${l.glyph} ${l.name}`).join(" · ");
  if (!total) {
    return `<div class="card"><h2>🏛️ Expert Council</h2>
      <p class="dim">Once a few pieces of feedback come in from ${esc(S.children[0] ? S.children[0].nickname : "your child")} and you, a panel of five expert lenses
      (${lensLegend}) rationalises them here into a prioritised "what to build next" — with safety able to veto.</p></div>`;
  }
  const card = r => {
    const th = r.theme, m = VERDICT_META[th.verdict];
    const back = (th.back || []).map(id => COUNCIL_LENSES.find(l => l.id === id)).filter(Boolean);
    const worry = (th.worry || []).map(id => COUNCIL_LENSES.find(l => l.id === id)).filter(Boolean);
    return `<div class="card" style="margin:10px 0">
      <div class="row spread"><b>${th.label}</b>
        <span class="tag ${m.cls}">${m.glyph} ${m.label}</span></div>
      <p class="dim" style="margin-top:6px"><small>${esc(th.rationale)}</small></p>
      <p style="margin-top:6px"><small><b>Next:</b> ${esc(th.action)}</small></p>
      <div class="row" style="flex-wrap:wrap;gap:6px;margin-top:8px">
        <span class="tag">mentions ×${r.count} (${r.kid}👦 ${r.parent}👪)</span>
        ${back.map(l => `<span class="tag good" title="${l.name} backs this">👍 ${l.glyph}</span>`).join("")}
        ${worry.map(l => `<span class="tag" style="color:var(--warn)" title="${l.name} flags a concern">⚠️ ${l.glyph}</span>`).join("")}
      </div></div>`;
  };
  return `<div class="card"><h2>🏛️ Expert Council</h2>
    <p class="dim">Five expert lenses (${lensLegend}) weigh every idea from ${esc(S.children.map(c=>c.nickname).join(" & ") || "your child")} and you.
    Child-safety can veto. Sorted by what to do first.</p></div>
    ${rows.map(card).join("")}
    <div class="card"><div class="actions"><button class="ghost" onclick="exportFeedback()">⬇ Export council + feedback (JSON)</button></div>
    <p class="dim"><small>This is a rule-based first pass to focus the human decision — not a replacement for your judgement.</small></p></div>`;
}

function saveParentFeedback() {

  if (nps == null && !wtp && !liked && !improve && !wish) return modal(`<h2>Nothing to send yet</h2><p>Add a score or a note first. 🙂</p>`);
  S.parentFeedback = S.parentFeedback || [];
  S.parentFeedback.unshift({ at: Date.now(), nps, wtp, liked, improve, wish, comments: "" });
  S.parentFeedback = S.parentFeedback.slice(0, 50);
  save();
  modal(`<h2>Thank you 💛</h2><p>Your feedback is saved on this device. It directly shapes what we build next — export it from the Feedback tab to send during the pilot.</p>
    <div class="actions"><button class="primary" onclick="this.closest('.modal-veil').remove();screenParent('feedback')">Done</button></div>`);
}

/* Rationalise raw feedback into a small insights model + rule-based recommendations. */
function feedbackInsights() {
  let loved = 0, okc = 0, meh = 0;
  S.children.forEach(c => { const f = funScore(c.id); if (f) { loved += f.loved; okc += f.ok; meh += f.meh; } });
  const kidTotal = loved + okc + meh;
  const pctLoved = kidTotal ? Math.round(loved / kidTotal * 100) : null;
  const pf = S.parentFeedback || [];
  const npsVals = pf.map(p => p.nps).filter(n => typeof n === "number");
  const nps = npsVals.length ? Math.round(npsVals.reduce((a, b) => a + b, 0) / npsVals.length * 10) / 10 : null;
  const wtpYes = pf.filter(p => p.wtp === "Yes").length;
  const wtpMaybe = pf.filter(p => p.wtp === "Maybe").length;
  /* aggregate kid reason tags across children */
  const tags = {};
  Object.values(S.funReasons || {}).forEach(rs => Object.entries(rs).forEach(([r, n]) => {
    if (r.startsWith("loved:")) return; tags[r] = (tags[r] || 0) + n;
  }));
  const topTag = Object.entries(tags).sort((a, b) => b[1] - a[1])[0];

  const suggestions = [];
  if (kidTotal === 0) suggestions.push("No child ratings yet — the strongest signal will come once they rate a few sessions.");
  else if (pctLoved != null && pctLoved >= 60) suggestions.push(`Kids are enjoying it (${pctLoved}% "loved") — protect what's working and keep adding variety.`);
  else if (pctLoved != null) suggestions.push(`Enjoyment is mixed (${pctLoved}% "loved") — the reason tags below point to the fix.`);
  if (topTag) {
    const map = { "Too hard": "Ease difficulty (already auto-lowering levels for those kids); consider gentler intro questions.",
      "Too easy": "Lift challenge — surface 'work ahead' more prominently for these kids.",
      "A bit boring": "Boost variety + gamification (more celebrations already enabled for them).",
      "Confusing": "Clarify explanations and slow the pace for affected kids.",
      "Too long": "Offer a shorter 'quick class' option." };
    suggestions.push(`Most common ask: "${topTag[0]}" (×${topTag[1]}). ${map[topTag[0]] || ""}`);
  }
  if (nps != null) suggestions.push(nps >= 8 ? `Parent NPS ${nps} is promising — candidates for referrals/testimonials.` : nps >= 6 ? `Parent NPS ${nps} is okay — the "one thing to improve" notes are the priority list.` : `Parent NPS ${nps} is low — read the improvement notes closely before scaling.`);
  if (pf.length) suggestions.push(`Willingness-to-pay so far: ${wtpYes} Yes, ${wtpMaybe} Maybe — the core pilot question.`);
  if (!suggestions.length) suggestions.push("Collect a few sessions and one parent response to unlock insights.");
  return { pctLoved, nps, wtpYes, wtpMaybe, suggestions };
}

function exportFeedback() {
  const council = runCouncil();
  const payload = {
    exportedAt: new Date().toISOString(),
    kidEnjoyment: S.fun || {}, kidReasons: S.funReasons || {}, kidWishes: S.wishes || {},
    parentFeedback: S.parentFeedback || [],
    insights: feedbackInsights(),
    council: council.rows.map(r => ({ theme: r.theme.label, verdict: r.theme.verdict, mentions: r.count,
      kid: r.kid, parent: r.parent, rationale: r.theme.rationale, action: r.theme.action,
      backedBy: r.theme.back, concerns: r.theme.worry || [] })),
    speaking: S.speakStats || {},
    northStar: S.northStar,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "sparkiq-feedback-" + todayKey() + ".json";
  a.click();
}

/* ---------- Remote LLM (optional; parent-configured) ---------- */
function callRemote(userText) {
  const sysPrompt = TUTOR_SYSTEM_PROMPT.replace("{{year}}", String(SES.child.year));
  return callRemoteRaw(sysPrompt, userText, SES.child);
}
/* Rough per-1M-token list prices (AUD, indicative — verify before launch). Keyed by provider. */
const COST_PER_MTOK = {
  gemini: { in: 0.30, out: 2.50 },
  anthropic: { in: 1.00, out: 5.00 },
  openai: { in: 0.50, out: 1.50 },
};
function estTokens(text) { return Math.ceil((text || "").length / 4); } // ~4 chars/token
/* Accumulate estimated cost-to-serve per family, so the pilot MEASURES the ≤$1.50/family/mo
   target instead of only modelling it (docs/unit-economics.md). Aggregate $ only, per month. */
function recordCost(inTok, outTok) {
  const rate = COST_PER_MTOK[S.settings.provider] || COST_PER_MTOK.anthropic;
  const cost = (inTok * rate.in + outTok * rate.out) / 1e6;
  const mk = todayKey().slice(0, 7); // YYYY-MM
  S.cost = S.cost || {};
  S.cost[mk] = (S.cost[mk] || 0) + cost;
  S.cost.calls = (S.cost.calls || 0) + 1;
  save();
}
function costThisMonth() { const mk = todayKey().slice(0, 7); return (S.cost && S.cost[mk]) || 0; }

/* Provider-pluggable single choke-point: Anthropic (Claude), Gemini, OpenAI-compatible.
   Output passes the safety filter before returning. Mirrors the production /api/llm router. */
async function callRemoteRaw(sysPrompt, userText, child) {
  const st = S.settings;
  const childId = child && child.id;
  const inTok = estTokens(sysPrompt) + estTokens(userText);
  try {
    let out = null;
    if (st.provider === "gemini") {
      const model = st.model || "gemini-2.5-flash";
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(st.key)}`, {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ system_instruction: { parts: [{ text: sysPrompt }] },
          contents: [{ role: "user", parts: [{ text: userText }] }],
          generationConfig: { maxOutputTokens: 500 } }),
      });
      const j = await resp.json();
      out = j?.candidates?.[0]?.content?.parts?.map(p => p.text).join("").trim();
    } else if (st.provider === "anthropic") {
      const resp = await fetch(st.endpoint || "https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "content-type": "application/json", "x-api-key": st.key,
          "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: st.model || "claude-haiku-4-5-20251001", max_tokens: 500,
          system: sysPrompt, messages: [{ role: "user", content: userText }] }),
      });
      const j = await resp.json();
      out = j?.content?.[0]?.text;
    } else {
      const resp = await fetch(st.endpoint, {
        method: "POST",
        headers: { "content-type": "application/json", authorization: "Bearer " + st.key },
        body: JSON.stringify({ model: st.model || "gpt-4o-mini", max_tokens: 500,
          messages: [{ role: "system", content: sysPrompt }, { role: "user", content: userText }] }),
      });
      const j = await resp.json();
      out = j?.choices?.[0]?.message?.content;
    }
    if (out) recordCost(inTok, estTokens(out));
    if (out && SAFETY.checkOutput(out)) return out.slice(0, 1200);
    if (out && childId) logSafety(childId, "moderation_output", "Remote reply blocked by output filter.");
  } catch (e) { console.warn("remote engine failed", e); }
  return null;
}

/* ============================================================
   PARENT AREA (PIN-gated)
   ============================================================ */
function parentGate() {
  let entered = "";
  const v = modal(`
    <h2 style="text-align:center">Parent area 🔐</h2>
    <p class="dim" style="text-align:center">Enter your 4-digit PIN</p>
    <div class="pin-dots" id="pd">${"<span></span>".repeat(4)}</div>
    <div class="pin-pad" id="pp">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-n="${n}">${n}</button>`).join("")}
      <button data-n="c">⌫</button><button data-n="0">0</button><button data-n="x">✕</button>
    </div>`);
  v.querySelector("#pp").onclick = async e => {
    const n = e.target.dataset?.n; if (!n) return;
    if (n === "x") return v.remove();
    if (n === "c") entered = entered.slice(0, -1);
    else if (entered.length < 4) entered += n;
    v.querySelectorAll("#pd span").forEach((s, i) => s.classList.toggle("on", i < entered.length));
    if (entered.length === 4) {
      if (await hashPin(entered) === S.family.pinHash) { v.remove(); screenParent("overview"); }
      else { entered = ""; v.querySelectorAll("#pd span").forEach(s => s.classList.remove("on"));
        v.querySelector("h2").textContent = "Not quite — try again 🔐"; }
    }
  };
}

}

    ${S.children.some(c => funScore(c.id)) ? `<div class="card"><h2>Do they enjoy it?</h2>

          <span>${c.avatar} ${esc(c.nickname)}</span>

    ${S.children.some(c => badgesFor(c.id).length) ? `<div class="card"><h2>Badges earned</h2>
      ${S.children.filter(c => badgesFor(c.id).length).map(c => `<div style="padding:6px 0">
        <b>${c.avatar} ${esc(c.nickname)}</b><div class="row" style="margin-top:6px;flex-wrap:wrap;gap:6px">

  }
  if (tab === "children") {
    return `<div class="card"><h2>Learner profiles</h2>
      ${S.children.map(c => `<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)">
        <div class="row spread">

        </div></div>`).join("")}
      <div class="actions"><button class="primary" onclick="screenAddChild()">＋ Add learner</button></div>
      <p class="dim" style="margin-top:10px"><small>Profiles hold a nickname, year level and curriculum only — by design, nothing else.
      <b>Voice answers</b> let your child speak instead of type. Note: on iPad/iPhone the spoken audio is sent to Apple for transcription (Spark can't avoid that on iOS), so it's off by default — turn it on only if you're comfortable with that. Read-aloud (Spark's voice) is fully on-device.</small></p></div>`;
  }
  if (tab === "feedback") return feedbackTab();
  if (tab === "safety") {
    return `<div class="card"><h2>Safety events</h2>
      <p class="dim">SparkIQ logs the <i>category</i> of safety events, never message content. Distress events deserve a gentle in-person check-in.</p>
      ${S.safety.length ? S.safety.slice(0, 30).map(e => {
        const c = S.children.find(x => x.id === e.childId);
        return `<div class="event ${e.kind === "distress" ? "" : "info"}"><b>${e.kind.replace(/_/g, " ")}</b> — ${c ? esc(c.nickname) : "?"}
        <br><small>${new Date(e.at).toLocaleString()} · ${esc(e.note)}</small></div>`;
      }).join("") : `<p style="margin-top:10px">No safety events. 🌤</p>`}
      <h3 style="margin-top:18px">Built-in protections</h3>
      <ul class="clean"><li>🛑 Distress language → supportive redirect + Kids Helpline 1800 55 1800</li>
      <li>🎭 Persona-override attempts refused (Spark is always Spark)</li>
      <li>⏱ Rate limits, message length caps, daily turn caps</li>
      <li>🌙 Break nudges that celebrate stopping · XP capped per session</li>
      <li>🚫 No ads, no dark patterns, no purchase paths in child sessions</li></ul></div>`;
  }
  if (tab === "privacy") {
    return `<div class="card privacy"><h2>Our privacy promise (plain English)</h2>
      <p><b>What we collect about your child:</b> a nickname, their school year, and which curriculum they follow. That's the lot.</p>

      <p><b>No ads. No trackers. No data sales. No marketing profiles.</b> Ever. This is an architecture decision, not just a policy.</p>

  }
  if (tab === "data") {
    return `<div class="card"><h2>Your data, your call</h2>

      <button class="ghost" onclick="importData()">⬆ Import</button></div>

      <button class="ghost" onclick="downloadPilotReadout()">⬇ Download</button></div></div>`;
  }
  return "";

/* Privacy-preserving aggregate readout: the mechanism by which the pilot collects evidence
   for the two open questions (do kids love it, does it pay). Numbers only — no identifiers,
   no nicknames, no message content ever. */
function pilotReadout() {
  const fam = { generatedFor: "month " + todayKey().slice(0, 7), children: [] };
  S.children.forEach((c, i) => {
    const wk = weeklyStats(c.id);
    const fun = funScore(c.id);
    const placed = Object.values(S.levels[c.id] || {}).filter(l => l.diag === "done").length;
    fam.children.push({
      child: "child_" + (i + 1), yearLevel: c.year,
      sessionsThisWeek: wk.count, minutesThisWeek: wk.mins,
      subjectsPlaced: placed, reviewsDue: dueReviews(c.id).length,
      enjoyment: fun ? { ratings: fun.total, pctLoved: fun.pctLoved } : null,
    });
  });
  fam.northStar = { justRightDiagnostics: S.northStar.diag, secondSessionWithin7d: S.northStar.second,
    conversionPct: S.northStar.diag ? Math.round(S.northStar.second / S.northStar.diag * 100) : 0 };
  fam.costToServe = { month: costThisMonth().toFixed(2), currency: CONFIG.currency, targetCeiling: 1.5,
    underTarget: costThisMonth() <= 1.5, aiCalls: (S.cost && S.cost.calls) || 0 };
  fam.plan = S.family.plan;
  return fam;
}
function pilotReadoutText() { return JSON.stringify(pilotReadout(), null, 2); }
function copyPilotReadout() {
  const t = pilotReadoutText();
  if (navigator.clipboard) navigator.clipboard.writeText(t).then(() => modal(`<h2>Copied ✔</h2><p>Paste it into your reply to the pilot team. Aggregate numbers only — no names, no chats.</p>`), () => {});
  else modal(`<h2>Select & copy</h2><pre style="white-space:pre-wrap;font-size:.8em">${esc(t)}</pre>`);
}
function downloadPilotReadout() {
  const blob = new Blob([pilotReadoutText()], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "sparkiq-pilot-readout-" + todayKey() + ".json";
  a.click();
}
function bindAiTab() {
  const eng = document.getElementById("ai-engine");
  eng.onchange = () => document.getElementById("ai-remote").style.display = eng.value === "remote" ? "block" : "none";
  document.getElementById("ai-save").onclick = () => {
    S.settings.engine = eng.value;
    if (eng.value === "remote") {
      S.settings.provider = document.getElementById("ai-provider").value;
      S.settings.endpoint = document.getElementById("ai-endpoint").value.trim();
      S.settings.model = document.getElementById("ai-model").value.trim();
      S.settings.key = document.getElementById("ai-key").value.trim();
    }
    save(); modal(`<h2>Saved ✔</h2><p>AI settings updated.</p>`);
  };
}
function toggleYoung(id) { const c = S.children.find(x => x.id === id); c.young = !c.young; save(); screenParent("children"); }
function toggleVoiceInput(id) { const c = S.children.find(x => x.id === id); c.voiceInput = !c.voiceInput; save(); screenParent("children"); }
function cycleBuddy(id) {
  const c = S.children.find(x => x.id === id);
  const i = PERSONAS.findIndex(p => p.id === c.persona);
  const next = PERSONAS[(i + 1) % PERSONAS.length];
  c.persona = next.id; c.avatar = next.emoji; save();
  TTS.speak(next.hi, next);
  screenParent("children");
}
function removeChild(id) {
  const c = S.children.find(x => x.id === id);
  modal(`<h2>Remove ${esc(c.nickname)}?</h2><p class="dim">This deletes their profile and learning history from this device. This cannot be undone.</p>
    <div class="actions"><button class="danger" onclick="reallyRemoveChild('${id}');this.closest('.modal-veil').remove()">Delete</button>
    <button class="ghost" onclick="this.closest('.modal-veil').remove()">Cancel</button></div>`);
}
function reallyRemoveChild(id) {
  S.children = S.children.filter(c => c.id !== id);
  delete S.levels[id]; delete S.quizStats[id]; delete S.summaries[id]; delete S.freeSubject[id];
  S.review = S.review.filter(r => r.childId !== id);
  S.sessions = S.sessions.filter(s => s.childId !== id);
  save(); screenParent("children");
}
function switchPlan(id) {
  S.family.plan = id; save();
  modal(`<h2>Plan updated ✔</h2><p>You're on <b>${CONFIG.tiers[id].label}</b>. During the pilot, billing is arranged personally — nothing is charged by the app.</p>`);
  screenParent("plan");
}
function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "sparkiq-backup-" + todayKey() + ".json";
  a.click();
}
function importData() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".json";
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try { const data = JSON.parse(r.result);
        if (!data.family) throw new Error("not a SparkIQ backup");
        S = Object.assign(blankState(), data); save();
        modal(`<h2>Imported ✔</h2><p>Welcome back!</p>`); screenParent("overview");
      } catch (e) { modal(`<h2>Hmm</h2><p>That file doesn't look like a SparkIQ backup.</p>`); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function wipeData() {
  modal(`<h2>Erase everything?</h2><p class="dim">All profiles, progress and settings on this device will be permanently deleted.</p>
    <div class="actions"><button class="danger" onclick="localStorage.removeItem('${DB_KEY}');location.reload()">Erase all data</button>
    <button class="ghost" onclick="this.closest('.modal-veil').remove()">Cancel</button></div>`);
}
function showPrivacy() { modal(parentTab("privacy")); }

/* ---------- Boot ---------- */
starfield();
if (!S.family) screenWelcome();
else screenProfiles();

</script>
